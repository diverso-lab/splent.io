{%- comment -%}
  Floating pill navbar (glass-light on scroll). Logo left, section links
  middle (md+), Docs + GitHub buttons right.
{%- endcomment -%}
<header class="fixed top-0 inset-x-0 z-50">
  <div class="mx-auto max-w-6xl px-4 pt-4">
    <nav class="glass-light flex items-center justify-between rounded-full px-4 py-2.5 shadow-[0_10px_40px_-15px_rgba(0,0,0,0.12)]">
      <a href="{{ '/' | relative_url }}" aria-label="SPLENT home" class="flex items-center gap-2">
        <img src="{{ '/splent_logo_dark.svg' | relative_url }}" alt="SPLENT" height="26" style="height: 26px; width: auto;" draggable="false">
      </a>

      <ul class="hidden md:flex items-center gap-7 text-[13.5px] text-ink-700">
        <li><a href="#features" class="text-ink-600/80 hover:text-ink-900 transition-colors">Features</a></li>
        <li><a href="#pillars" class="text-ink-600/80 hover:text-ink-900 transition-colors">Ecosystem</a></li>
        <li><a href="#how" class="text-ink-600/80 hover:text-ink-900 transition-colors">How it works</a></li>
        <li><a href="#why" class="text-ink-600/80 hover:text-ink-900 transition-colors">Why SPLENT</a></li>
      </ul>

      <div class="flex items-center gap-2">
        <a href="{{ site.docs_url }}" class="hidden sm:inline-flex items-center gap-1.5 rounded-full px-3.5 py-1.5 text-[13px] font-medium text-ink-700 hover:bg-black/5 transition">
          Docs
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>
        </a>
        <a href="{{ site.github_url }}" target="_blank" rel="noreferrer" class="inline-flex items-center gap-1.5 rounded-full bg-ink-900 px-3.5 py-1.5 text-[13px] font-medium text-white hover:bg-ink-800 transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2c-3.34.73-4.04-1.61-4.04-1.61-.54-1.39-1.33-1.76-1.33-1.76-1.09-.75.08-.74.08-.74 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.39 1.24-3.23-.13-.3-.54-1.53.11-3.18 0 0 1-.32 3.3 1.23a11.49 11.49 0 0 1 6 0c2.28-1.55 3.28-1.23 3.28-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.92 1.24 3.23 0 4.61-2.81 5.63-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58A12 12 0 0 0 12 .5Z"/></svg>
          GitHub
        </a>
      </div>
    </nav>
  </div>
</header>
